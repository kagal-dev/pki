name: Publish to NPM

on:
  push:
    tags:
      - '@*/*@[0-9]*'

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # OIDC trusted publishing needs a recent npm: node 24
          # bundles one new enough, whereas node 22 ships an older
          # npm that cannot self-update to a supporting version.
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Publish ${{ github.ref_name }}
        run: pnpm --filter "${TAG%@*}" publish:maybe --provenance --no-git-checks
        env:
          TAG: ${{ github.ref_name }}
